<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Alumni System UMM</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body style="background:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center">
<div style="width:100%;max-width:420px;padding:24px">
  <!-- Logo -->
  <div style="text-align:center;margin-bottom:36px">
    <div style="width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;box-shadow:0 8px 24px rgba(45,91,227,.4)">
      <svg viewBox="0 0 36 36" fill="none" width="30" height="30"><circle cx="18" cy="18" r="17" stroke="white" stroke-width="1.5"/><path d="M10 24c0-4.4 3.6-8 8-8s8 3.6 8 8" stroke="white" stroke-width="1.5" stroke-linecap="round"/><circle cx="18" cy="13" r="3.5" stroke="white" stroke-width="1.5"/></svg>
    </div>
    <div style="font-family:'Playfair Display',serif;font-size:24px;font-weight:900;color:#fff;letter-spacing:-.5px">Alumni System</div>
    <div style="font-size:12px;color:rgba(255,255,255,.4);margin-top:4px;letter-spacing:.5px;text-transform:uppercase">Universitas Muhammadiyah Malang</div>
  </div>

  <!-- Card -->
  <div style="background:#fff;border-radius:18px;padding:36px;box-shadow:0 24px 60px rgba(0,0,0,.3)">
    <h2 style="font-family:'Playfair Display',serif;font-size:20px;font-weight:700;margin-bottom:6px;color:var(--text)">Masuk ke Sistem</h2>
    <p style="font-size:13px;color:var(--text-dim);margin-bottom:28px">Gunakan akun yang telah didaftarkan</p>

    {% if error %}
    <div style="background:var(--red-soft);border:1.5px solid rgba(220,38,38,.2);border-radius:9px;padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:20px;display:flex;gap:8px;align-items:center">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      {{ error }}
    </div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Masukkan username" autofocus required>
      </div>
      <div class="form-group" style="margin-bottom:24px">
        <label class="form-label">Password</label>
        <div style="position:relative">
          <input type="password" name="password" id="pw-input" class="form-control" placeholder="Masukkan password" required>
          <button type="button" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-dim)">
            <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn btn-accent btn-lg" style="width:100%;justify-content:center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10,17 15,12 10,7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
        Masuk
      </button>
    </form>

    <div style="margin-top:20px;padding-top:20px;border-top:1.5px solid var(--border);font-size:12px;color:var(--text-dim);text-align:center">
      Default: <code style="background:var(--surface2);padding:2px 7px;border-radius:5px">admin</code> / <code style="background:var(--surface2);padding:2px 7px;border-radius:5px">admin123</code>
    </div>
  </div>
</div>
<script>
function togglePw() {
  const i = document.getElementById('pw-input');
  i.type = i.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
